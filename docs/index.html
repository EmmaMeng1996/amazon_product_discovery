!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Amazon Product Discovery</title><style>body{margin:0;font-family:Arial,sans-serif;background:#f6f7fb;color:#17202a}.wrap{display:grid;grid-template-columns:220px 1fr;min-height:100vh}aside{background:white;border-right:1px solid #ddd;padding:22px}button{padding:9px 12px;border:1px solid #ddd;background:white;border-radius:6px;cursor:pointer;margin:4px}button.primary{background:#111827;color:white}.main{padding:24px}.card{background:white;border:1px solid #ddd;border-radius:8px;padding:16px;margin:12px 0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat b{font-size:28px}.grade{display:inline-block;padding:4px 8px;border-radius:6px;font-weight:bold}.A{background:#d1fae5;color:#047857}.B{background:#dbeafe;color:#1d4ed8}.C{background:#fef3c7;color:#b45309}.D{background:#eee;color:#555}table{width:100%;border-collapse:collapse;background:white}td,th{border-bottom:1px solid #eee;padding:10px;text-align:left;font-size:13px}input{padding:9px;border:1px solid #ccc;border-radius:6px}.risk{color:#be123c;font-weight:bold}</style></head><body><div class="wrap"><aside><h2>Amazon Discovery</h2><p>Product selection engine</p><button onclick="view('dash')">Dashboard</button>button><button onclick="view('import')">Import</button>button><button onclick="view('list')">Products</button>button></aside><main class="main" id="app"></main>main></div>div><script>let products=JSON.parse(localStorage.apde_products||'null')||[{asin:'B0PET0003',title:'Pet Slow Feeder Lick Mat',cat:'Pet Supplies',price:21.99,rating:4.1,reviews:270,sellers:7,sales:3200,rank:9800,weight:.22},{asin:'B0HOME002',title:'Home Drawer Organizer',cat:'Home',price:39.99,rating:4.4,reviews:420,sellers:9,sales:1900,rank:15000,weight:.78},{asin:'B0OFF004',title:'Office Cable Clips',cat:'Office',price:18.99,rating:4.6,reviews:95,sellers:4,sales:1100,rank:52000,weight:.12},{asin:'B0RISK005',title:'Oversize Magnetic Liquid Cleaner',cat:'Risk',price:89.99,rating:3.9,reviews:2300,sellers:32,sales:5000,rank:2000,weight:3.4}];function n(v){let x=Number(String(v||'').replace(/[^0-9.]/g,''));return isFinite(x)?x:0}function score(p){let comp=(p.reviews>=50&&p.reviews<=800?25:10)+(p.sellers<=10?15:5)+(p.rank<=60000?10:3);let profit=(p.price>=20&&p.price<=80?20:8)+(p.weight<=1?15:3);let diff=(p.reviews>=50&&p.reviews<=500?20:10)+(p.rating<4.5?10:6);let dev=(/app|smart|medical|food|liquid|magnetic|oversize/i.test(p.title+' '+p.cat)?5:20);let total=Math.min(100,Math.round((comp+profit+diff+dev)*10/9));let g='D';let reason='';if(total>=85&&p.sales>600&&p.rank>0&&p.rank<=10000){g='A';reason='A: score >=85, monthly sales >600, category rank <=10000.'}else if(total>=70&&p.sales>300&&p.rank>=10001&&p.rank<=20000){g='B';reason='B: score >=70, monthly sales >300, category rank 10001-20000.'}else if(total>=60&&p.sales>100){g='C';reason='C: observation. It missed A/B score, sales, or rank gate.'}else{reason='D: not recommended.'}return{total,g,reason}}function enrich(){products=products.map(p=>Object.assign(p,{score:score(p)}));localStorage.apde_products=JSON.stringify(products)}function grade(x){return '<span class="grade '+x+'">'+x+'</span>'}function link(p){return '<a target="_blank" href="https://www.amazon.com/dp/'+p.asin+'">'+p.asin+'</a>'}function table(rows){return '<table><tr><th>Grade</th><th>Product</th><th>Category</th><th>Price</th><th>Sales</th><th>Rank</th><th>Score</th><th>AI analysis</th></tr>'+rows.map(p=>'<tr><td>'+grade(p.score.g)+'</td><td><b>'+p.title+'</b><br>'+link(p)+'</td><td>'+p.cat+'</td><td>$'+p.price+'</td><td>'+p.sales+'</td><td>'+p.rank+'</td><td>'+p.score.total+'</td><td>'+p.score.reason+'</td></tr>').join('')+'</table>'}function dash(){enrich();let c=g=>products.filter(p=>p.score.g==g).length;app.innerHTML='<h1>Dashboard</h1><div class="stats"><div class="card stat">Total<br><b>'+products.length+'</b></div><div class="card stat">A<br><b>'+c('A')+'</b></div><div class="card stat">B<br><b>'+c('B')+'</b></div><div class="card stat">C<br><b>'+c('C')+'</b></div></div><div class="card"><h3>Scoring standard</h3><p>A: score >=85, monthly sales >600, category rank <=10000.</p><p>B: score >=70, monthly sales >300, category rank 10001-20000.</p><p>C: score >=60, monthly sales >100.</p></div><h2>Top products</h2>'+table([...products].sort((a,b)=>b.score.total-a.score.total))}function csv(){app.innerHTML='<h1>Import CSV</h1><div class="card"><input type="file" id="f" accept=".csv"><p>Columns: asin,title,cat,price,rating,reviews,sellers,sales,rank,weight</p></div>';f.onchange=e=>{let r=new FileReader();r.onload=()=>{let lines=r.result.trim().split(/
  ?
  /);let h=lines.shift().split(',');products=lines.map(line=>{let a=line.split(',');let o={};h.forEach((k,i)=>o[k.trim()]=a[i]);return{asin:o.asin||o.ASIN,title:o.title||o.Title,cat:o.cat||o.category,price:n(o.price),rating:n(o.rating),reviews:n(o.reviews),sellers:n(o.sellers),sales:n(o.sales),rank:n(o.rank),weight:n(o.weight)}});enrich();dash()};r.readAsText(e.target.files[0])}}function list(){enrich();app.innerHTML='<h1>Products</h1><div class="card"><input id="q" placeholder="Search ASIN/title"> <button onclick="list()">Reset</button></div><div id="t"></div>';function draw(){let s=q.value.toLowerCase();t.innerHTML=table(products.filter(p=>(p.asin+' '+p.title).toLowerCase().includes(s)).sort((a,b)=>b.score.total-a.score.total))}q.oninput=draw;draw()}function view(v){if(v=='dash')dash();if(v=='import')csv();if(v=='list')list()}dash();</script></body></html></script></p></h2></aside></body></style></title></head></html>
